<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iseriroute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1c19;
            --card-bg: #2d332b;
            --card-border: #384036;
            --text-primary: #e0e6df;
            --text-secondary: #9aa398;
            --accent: #a6bc82;
            --accent-dim: #a3b89b;
            --accent-faded: rgba(166, 188, 130, 0.15);
            --btn-secondary: #1a1c19;
            --font-main: 'Poppins', sans-serif;
            --glass-blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            text-transform: lowercase;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 30px;
            padding: 30px 40px 40px 40px;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bottom-row {
            display: grid;
            grid-template-columns: 1.4fr 1.1fr 0.8fr;
            gap: 30px;
            min-height: 0;
            flex: 1;
        }

        .bottom-row > section {
            min-height: 0;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent-dim);
        }

        .card.transparent {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .label-small {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-dim);
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .time-main {
            font-size: 6rem;
            font-weight: 400;
            line-height: 1;
            margin-bottom: 10px;
        }

        .date-sub {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        #pomodoro {
            width: 320px;
            align-items: center;
            justify-content: center;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 500;
            margin: 15px 0;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            border-radius: 100px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: lowercase;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg-color);
            padding: 16px 32px;
            flex: 1.5;
        }

        .btn-secondary {
            background-color: var(--btn-secondary);
            color: var(--text-primary);
            padding: 14px 24px;
            flex: 1;
        }

        .btn-secondary:hover {
            background-color: var(--card-border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-pill {
            font-size: 0.7rem;
            background-color: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 10px;
            color: var(--text-secondary);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-faded) transparent;
            padding-right: 5px;
        }

        .list-container::-webkit-scrollbar {
            width: 4px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--accent-faded);
            border-radius: 10px;
        }

        .routine-item, .upcoming-item, .checklist-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .routine-item {
            gap: 15px;
        }

        .time-stamp {
            font-size: 0.8rem;
            color: var(--accent);
            min-width: 45px;
        }

        .task-info {
            display: flex;
            flex-direction: column;
        }

        .task-title {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .task-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .routine-item.active {
            background: linear-gradient(90deg, var(--accent-faded) 0%, transparent 100%);
        }

        .routine-item.done .task-title {
            text-decoration: line-through;
            opacity: 0.4;
        }

        .routine-item.checkable {
            cursor: pointer;
        }

        .routine-item.checkable:hover {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }

        .routine-checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            margin-left: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--bg-color);
            transition: all 0.2s;
        }

        .routine-checkbox.checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checklist-item {
            gap: 16px;
            padding: 16px 0;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 1px solid var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--bg-color);
            transition: all 0.2s;
        }

        .checkbox-custom.checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checklist-item.done .task-title {
            text-decoration: line-through;
            opacity: 0.4;
        }

        .add-task-container {
            margin-top: 15px;
            padding-top: 10px;
        }

        #new-task-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px 0;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            opacity: 0.35;
            transition: opacity 0.3s;
        }

        #new-task-input:focus {
            opacity: 1;
            border-color: var(--accent);
        }

        .btn-link {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: lowercase;
        }

        .btn-link:hover {
            color: var(--accent);
        }

        .upcoming-item {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .upcoming-item:hover {
            background: rgba(255,255,255,0.05);
            transform: none;
        }

        .event-details {
            display: flex;
            flex-direction: column;
        }

        .event-name {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .event-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.6s ease forwards; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
        .card:nth-child(5) { animation-delay: 0.4s; }
    </style>
</head>
<body class="iseriroute-theme">
    <div class="container landscape">
        <header class="top-row">
            <div id="time-display" class="card transparent text-left">
                <div class="label-small">current time</div>
                <div class="time-main" id="clock">00:00</div>
                <div class="date-sub" id="date">thursday, march 26</div>
            </div>
            
            <div id="pomodoro" class="card">
                <div class="label-small text-center">pomodoro</div>
                <div class="timer-display" id="timer-text">25:00</div>
                <div class="timer-controls">
                    <button id="timer-start" class="btn btn-primary">start</button>
                    <button id="timer-reset" class="btn btn-secondary">reset</button>
                </div>
            </div>
        </header>

        <main class="bottom-row">
            <section id="routine" class="card">
                <div class="section-header">
                    <h2 class="section-title">daily routine</h2>
                    <div class="status-pill" id="routine-status">-- items left</div>
                </div>
                <div class="list-container" id="routine-list"></div>
            </section>

            <section id="upcoming" class="card">
                <div class="section-header">
                    <h2 class="section-title">upcoming</h2>
                </div>
                <div class="list-container" id="upcoming-list"></div>
            </section>

            <section id="checklist" class="card">
                <div class="section-header">
                    <h2 class="section-title">checklist</h2>
                    <button id="clear-done" class="btn-link">clear done</button>
                </div>
                <div class="list-container" id="checklist-items"></div>
                <div class="add-task-container">
                    <input type="text" id="new-task-input" placeholder="+ add a quick task..." autocomplete="off">
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- Configurations & Data ---
        const WEEKDAY_ROUTINE = [
            { time: "06:30", task: "wake up", sub: "morning light" },
            { time: "06:45", task: "school", sub: "be on time" },
            { time: "12:15", task: "leave school", sub: "heading back" },
            { time: "12:50", task: "home", sub: "reset gear" },
            { time: "13:10", task: "lunch finish", sub: "refuel" },
            { time: "13:10", task: "decompress", sub: "no guilt required", end: "14:00" },
            { time: "14:00", task: "math block 1", sub: "deep focus", end: "15:00", checkable: true },
            { time: "15:00", task: "break", sub: "stretch", end: "15:20" },
            { time: "15:20", task: "japanese", sub: "flashcards + kanji", end: "16:20", checkable: true },
            { time: "16:20", task: "walk", sub: "15min + transition", end: "16:40", checkable: true },
            { time: "16:40", task: "calisthenics", sub: "consistency > intensity", end: "17:10", checkable: true },
            { time: "17:10", task: "shower/reset", sub: "unwind", end: "17:30", checkable: true },
            { time: "17:30", task: "free time", sub: "genuinely free", end: "18:30" },
            { time: "21:00", task: "math block 2", sub: "review + practice", end: "22:00", checkable: true },
            { time: "22:00", task: "wind down", sub: "sleep target 23:00" }
        ];

        const SATURDAY_ROUTINE = [
            { time: "10:00", task: "english class", sub: "practice speaking", end: "12:00", checkable: true },
            { time: "12:00", task: "lunch & decompress", sub: "break time", end: "13:00" },
            { time: "13:00", task: "math block 1", sub: "practice sets", end: "14:00", checkable: true },
            { time: "14:00", task: "break", sub: "chill", end: "14:20" },
            { time: "14:20", task: "japanese", sub: "deep study", end: "15:20", checkable: true },
            { time: "15:20", task: "walk", sub: "outdoor walk", end: "15:40", checkable: true },
            { time: "15:40", task: "calisthenics", sub: "workout", end: "16:10", checkable: true },
            { time: "16:10", task: "rest of day", sub: "free time" }
        ];

        const UPCOMING_EVENTS = [
            { name: "grammar exam", date: "today • mar 26" },
            { name: "bio i & ii exam", date: "in 5 days • mar 31" },
            { name: "2nd call exams", date: "in 7 days • apr 02" },
            { name: "monthly project", date: "apr 10" }
        ];

        // --- State ---
        let timerInterval;
        let timerSeconds = 25 * 60;
        let isTimerRunning = false;

        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            renderRoutine();
            setInterval(renderRoutine, 60000);
            renderUpcoming();
            renderChecklist();
            setupPomodoro();
            setupChecklistInput();
        });

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options).toLowerCase();
        }

        function renderRoutine() {
            const container = document.getElementById('routine-list');
            const statusPill = document.getElementById('routine-status');
            const now = new Date();
            const isSaturday = now.getDay() === 6;
            const isSunday = now.getDay() === 0;
            let routine = isSaturday ? SATURDAY_ROUTINE : (isSunday ? [] : WEEKDAY_ROUTINE);
            container.innerHTML = '';
            if (routine.length === 0) {
                container.innerHTML = '<div class="task-sub">it\'s sunday! rest day.</div>';
                statusPill.textContent = '0 items left';
                return;
            }
            const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const todayStr = now.toISOString().split('T')[0];
            const routineStates = JSON.parse(localStorage.getItem(`iseriroute-routine-${todayStr}`) || '{}');
            let remaining = 0;
            routine.forEach((item, index) => {
                const isDone = routineStates[index] || false;
                const itemEl = document.createElement('div');
                itemEl.className = `routine-item ${isDone ? 'done' : ''} ${item.checkable ? 'checkable' : ''}`;
                if (item.checkable) {
                    itemEl.onclick = () => toggleRoutineTask(index, todayStr);
                }
                const isActive = item.end ? (currentTimeStr >= item.time && currentTimeStr < item.end) : false;
                if (isActive) itemEl.classList.add('active');
                if (item.checkable && !isDone) remaining++;
                let checkboxHtml = item.checkable ? `<div class="routine-checkbox ${isDone ? 'checked' : ''}">${isDone ? '✓' : ''}</div>` : '';
                itemEl.innerHTML = `
                    <div class="time-stamp">${item.time}</div>
                    <div class="task-info"><div class="task-title">${item.task}</div><div class="task-sub">${item.sub}</div></div>
                    ${checkboxHtml}
                `;
                container.appendChild(itemEl);
                if (isActive) { setTimeout(() => itemEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100); }
            });
            statusPill.textContent = `${remaining} items left`;
        }

        function toggleRoutineTask(index, dateStr) {
            const key = `iseriroute-routine-${dateStr}`;
            const states = JSON.parse(localStorage.getItem(key) || '{}');
            states[index] = !states[index];
            localStorage.setItem(key, JSON.stringify(states));
            renderRoutine();
        }

        function renderUpcoming() {
            const container = document.getElementById('upcoming-list');
            container.innerHTML = '';
            UPCOMING_EVENTS.forEach(event => {
                const item = document.createElement('div');
                item.className = 'upcoming-item';
                item.innerHTML = `<div class="event-details"><div class="event-name">${event.name}</div><div class="event-date">${event.date}</div></div>`;
                container.appendChild(item);
            });
        }

        function renderChecklist() {
            const list = JSON.parse(localStorage.getItem('iseriroute-checklist') || '[]');
            const container = document.getElementById('checklist-items');
            container.innerHTML = '';
            list.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = `checklist-item ${task.done ? 'done' : ''}`;
                item.innerHTML = `<div class="checkbox-custom ${task.done ? 'checked' : ''}" onclick="toggleTask(${index})">${task.done ? '✓' : ''}</div><div class="task-title">${task.text}</div>`;
                container.appendChild(item);
            });
        }

        function setupChecklistInput() {
            const input = document.getElementById('new-task-input');
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter' && input.value.trim()) { addTask(input.value.trim()); input.value = ''; } });
            document.getElementById('clear-done').onclick = () => {
                const list = JSON.parse(localStorage.getItem('iseriroute-checklist') || '[]');
                localStorage.setItem('iseriroute-checklist', JSON.stringify(list.filter(t => !t.done)));
                renderChecklist();
            };
        }

        function addTask(text) {
            const list = JSON.parse(localStorage.getItem('iseriroute-checklist') || '[]');
            list.push({ text: text.toLowerCase(), done: false });
            localStorage.setItem('iseriroute-checklist', JSON.stringify(list));
            renderChecklist();
        }

        window.toggleTask = function(index) {
            const list = JSON.parse(localStorage.getItem('iseriroute-checklist') || '[]');
            list[index].done = !list[index].done;
            localStorage.setItem('iseriroute-checklist', JSON.stringify(list));
            renderChecklist();
        };

        function setupPomodoro() {
            const startBtn = document.getElementById('timer-start');
            const updateDisp = () => {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                document.getElementById('timer-text').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            };
            startBtn.onclick = () => {
                if (isTimerRunning) { clearInterval(timerInterval); isTimerRunning = false; startBtn.textContent = 'start'; }
                else {
                    isTimerRunning = true; startBtn.textContent = 'pause';
                    timerInterval = setInterval(() => { if (timerSeconds > 0) { timerSeconds--; updateDisp(); } else { clearInterval(timerInterval); isTimerRunning = false; alert('done!'); } }, 1000);
                }
            };
            document.getElementById('timer-reset').onclick = () => { clearInterval(timerInterval); isTimerRunning = false; timerSeconds = 25 * 60; updateDisp(); startBtn.textContent = 'start'; };
            updateDisp();
        }
    </script>
</body>
</html>
